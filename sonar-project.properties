# SonarQube project configuration
sonar.projectKey=post-disaster-alert
sonar.projectName=Post Disaster Alert
sonar.projectVersion=0.1.0

# Source directories
sonar.sources=src
sonar.sourceEncoding=UTF-8

# TypeScript/JavaScript analysis
sonar.language=ts
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions — files/dirs not to analyse
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/public/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx

# Test file patterns
sonar.test.inclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx
