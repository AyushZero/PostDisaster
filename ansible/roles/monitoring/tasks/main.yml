---
- name: Validate Slack webhook URL is configured
  ansible.builtin.assert:
    that:
      - slack_webhook_url | length > 0
    fail_msg: "SLACK_WEBHOOK_URL is required to deploy Alertmanager with Slack notifications."

- name: Ensure monitoring working directory exists
  ansible.builtin.file:
    path: "{{ monitoring_workdir }}"
    state: directory
    mode: '0755'

- name: Ensure monitoring config directory exists
  ansible.builtin.file:
    path: "{{ monitoring_config_dir }}"
    state: directory
    mode: '0755'

- name: Ensure Grafana provisioning directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ monitoring_config_dir }}/grafana"
    - "{{ monitoring_config_dir }}/grafana/provisioning"
    - "{{ monitoring_config_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_config_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_config_dir }}/grafana/dashboards"

- name: Render Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_config_dir }}/prometheus.yml"
    mode: '0644'

- name: Render Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ monitoring_config_dir }}/alertmanager.yml"
    mode: '0644'

- name: Ensure Alertmanager config is readable by containers
  ansible.builtin.file:
    path: "{{ monitoring_config_dir }}/alertmanager.yml"
    state: file
    owner: root
    group: root
    mode: '0644'

- name: Render blackbox exporter config
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ monitoring_config_dir }}/blackbox.yml"
    mode: '0644'

- name: Render Prometheus alert rules
  ansible.builtin.template:
    src: alerts.yml.j2
    dest: "{{ monitoring_config_dir }}/alerts.yml"
    mode: '0644'

- name: Render Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana/provisioning/datasources/prometheus.yml.j2
    dest: "{{ monitoring_config_dir }}/grafana/provisioning/datasources/prometheus.yml"
    mode: '0644'

- name: Render Grafana dashboard provider
  ansible.builtin.template:
    src: grafana/provisioning/dashboards/dashboard-provider.yml.j2
    dest: "{{ monitoring_config_dir }}/grafana/provisioning/dashboards/dashboard-provider.yml"
    mode: '0644'

- name: Render Grafana dashboard JSON
  ansible.builtin.template:
    src: grafana/dashboards/overview.json.j2
    dest: "{{ monitoring_config_dir }}/grafana/dashboards/overview.json"
    mode: '0644'

- name: Ensure monitoring docker network exists
  ansible.builtin.command:
    cmd: "docker network create {{ monitoring_network }}"
  register: create_network
  changed_when: create_network.rc == 0
  failed_when: false

- name: Stop existing monitoring containers if present
  ansible.builtin.command:
    cmd: "docker rm -f {{ item }}"
  loop:
    - "{{ prometheus_container_name }}"
    - "{{ grafana_container_name }}"
    - "{{ alertmanager_container_name }}"
    - "{{ node_exporter_container_name }}"
    - "{{ blackbox_container_name }}"
    - "{{ kube_state_metrics_container_name }}"
  register: remove_monitoring_containers
  changed_when: remove_monitoring_containers.rc == 0
  failed_when: false

- name: Start node exporter
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ node_exporter_container_name }}
      --restart unless-stopped
      --network {{ monitoring_network }}
      --pid host
      -v /:/host:ro,rslave
      {{ node_exporter_image }}
      --path.rootfs=/host

- name: Start Alertmanager
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ alertmanager_container_name }}
      --restart unless-stopped
      --network {{ monitoring_network }}
      -p {{ alertmanager_host_port }}:9093
      -v {{ monitoring_config_dir }}/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      {{ alertmanager_image }}
      --config.file=/etc/alertmanager/alertmanager.yml

- name: Start blackbox exporter
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ blackbox_container_name }}
      --restart unless-stopped
      --network {{ monitoring_network }}
      -p 9115:9115
      -v {{ monitoring_config_dir }}/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
      {{ blackbox_image }}
      --config.file=/etc/blackbox_exporter/config.yml

- name: Check if k3s kubeconfig exists for kube-state-metrics
  ansible.builtin.stat:
    path: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig_stat

- name: Start kube-state-metrics
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ kube_state_metrics_container_name }}
      --restart unless-stopped
      --network host
      -v /etc/rancher/k3s:/etc/rancher/k3s:ro
      -v /var/lib/rancher/k3s:/var/lib/rancher/k3s:ro
      -e KUBECONFIG=/etc/rancher/k3s/k3s.yaml
      {{ kube_state_metrics_image }}
      --kubeconfig=/etc/rancher/k3s/k3s.yaml
      --port={{ kube_state_metrics_host_port }}
      --telemetry-port=8081
  when: k3s_kubeconfig_stat.stat.exists

- name: Start Prometheus
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ prometheus_container_name }}
      --restart unless-stopped
      --network {{ monitoring_network }}
      -p {{ prometheus_host_port }}:9090
      -v {{ monitoring_config_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      -v {{ monitoring_config_dir }}/alerts.yml:/etc/prometheus/alerts.yml:ro
      {{ prometheus_image }}
      --config.file=/etc/prometheus/prometheus.yml

- name: Start Grafana
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ grafana_container_name }}
      --restart unless-stopped
      --network {{ monitoring_network }}
      -p {{ grafana_host_port }}:3000
      -e GF_SECURITY_ADMIN_USER={{ grafana_admin_user }}
      -e GF_SECURITY_ADMIN_PASSWORD={{ grafana_admin_password }}
      -v {{ monitoring_config_dir }}/grafana/provisioning:/etc/grafana/provisioning:ro
      -v {{ monitoring_config_dir }}/grafana/dashboards:/var/lib/grafana/dashboards:ro
      {{ grafana_image }}

- name: Wait for Alertmanager health endpoint
  become: false
  block:
    - name: Poll Alertmanager health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ alertmanager_host_port }}/-/healthy"
        method: GET
        status_code: 200
      register: alertmanager_health
      retries: 24
      delay: 5
      until: alertmanager_health.status == 200
  rescue:
    - name: Give container extra time to stabilize before diagnostics
      ansible.builtin.pause:
        seconds: 3

    - name: Check if Alertmanager container exists and is running
      ansible.builtin.shell:
        cmd: "docker ps -a --filter 'name={{ alertmanager_container_name }}'"
      register: container_status
      changed_when: false
      failed_when: false

    - name: Get full Alertmanager logs
      ansible.builtin.shell:
        cmd: "docker logs {{ alertmanager_container_name }} 2>&1 || echo 'FAILED TO GET LOGS - container may not exist'"
      register: alertmanager_logs_full
      changed_when: false
      failed_when: false

    - name: Print rendered Alertmanager config
      ansible.builtin.slurp:
        src: "{{ monitoring_config_dir }}/alertmanager.yml"
      register: alertmanager_config_content
      failed_when: false

    - name: Try direct health check via docker exec
      ansible.builtin.shell:
        cmd: "docker exec {{ alertmanager_container_name }} wget -q -O- http://localhost:9093/-/healthy 2>&1 || echo 'EXEC FAILED - container not running'"
      register: direct_health_check
      changed_when: false
      failed_when: false

    - name: Check port binding
      ansible.builtin.shell:
        cmd: "ss -tlnp 2>/dev/null | grep 9093 || echo 'Port 9093 not listening on any interface'"
      register: port_check
      changed_when: false
      failed_when: false

    - name: List all monitoring containers
      ansible.builtin.shell:
        cmd: "docker ps -a --filter 'network={{ monitoring_network }}'"
      register: all_containers
      changed_when: false
      failed_when: false

    - name: Fail with comprehensive diagnostics
      ansible.builtin.fail:
        msg: |
          Alertmanager health check failed after 24 retries (120 seconds).
          
          === ALERTMANAGER CONTAINER STATUS ===
          {{ container_status.stdout }}
          
          === ALL MONITORING CONTAINERS ===
          {{ all_containers.stdout }}
          
          === PORT BINDING STATUS ===
          {{ port_check.stdout }}
          
          === ALERTMANAGER LOGS ===
          {{ alertmanager_logs_full.stdout }}
          
          === DIRECT HEALTH CHECK (docker exec) ===
          {{ direct_health_check.stdout }}
          
          === RENDERED ALERTMANAGER CONFIG ===
          {{ alertmanager_config_content.content | default('Could not read config') | b64decode }}

- name: Wait for Prometheus ready endpoint
  become: false
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ prometheus_host_port }}/-/ready"
    method: GET
    status_code: 200
  register: prometheus_health
  retries: 12
  delay: 5
  until: prometheus_health.status == 200

- name: Wait for Grafana health endpoint
  become: false
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ grafana_host_port }}/api/health"
    method: GET
    status_code: 200
  register: grafana_health
  retries: 12
  delay: 5
  until: grafana_health.status == 200
