apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

nameSuffix: ""

patches:
  # Blue: 1 replica for dev
  - target:
      kind: Deployment
      name: post-disaster-alert-blue
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  # Green: 1 replica for dev
  - target:
      kind: Deployment
      name: post-disaster-alert-green
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi

  # Disable HPA in dev
  - target:
      kind: HorizontalPodAutoscaler
      name: post-disaster-alert
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

  # Dev-specific env
  - target:
      kind: ConfigMap
      name: app-config
    patch: |
      - op: replace
        path: /data/NODE_ENV
        value: development

  # Dev ingress host
  - target:
      kind: Ingress
      name: post-disaster-alert
    patch: |
      - op: replace
        path: /spec/rules/0/host
        value: dev.post-disaster-alert.local
