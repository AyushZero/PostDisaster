apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: post-disaster-alert
  namespace: post-disaster-alert
  labels:
    app.kubernetes.io/name: post-disaster-alert
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - host: post-disaster-alert.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: post-disaster-alert
                port:
                  number: 80
