global:
  resolve_timeout: 5m
  slack_api_url: "https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK_URL"

route:
  receiver: slack-warnings
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: slack-critical
      match:
        severity: critical
      continue: false
    - receiver: slack-warnings
      match:
        severity: warning

receivers:
  - name: slack-critical
    slack_configs:
      - channel: "#alerts-critical"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: slack-warnings
    slack_configs:
      - channel: "#alerts-warnings"
        send_resolved: true
        title: '{{ template "slack.title" . }}'
        text: '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'

templates:
  - "/etc/alertmanager/templates/*.tmpl"
